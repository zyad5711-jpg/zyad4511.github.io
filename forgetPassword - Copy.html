<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="images/healU-circle.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forget Password</title>
  <link rel="stylesheet" href="css/forgetPassword.css">
  <link rel="stylesheet" href="css/header.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="header">
    <div class="links">
      <div class="left-links">
        <a href="bodyFooter.html" class="logo"><img src="images/clinic2.png"></a>
      </div>
      <div class="right-links">
        <a href="contact.html" class="contact-header">Contact us</a>
        <a href="login.html" class="log-in">Login</a>

        <label class="switch">
          <input type="checkbox">
          <span class="slider">
            <span class="icon sun">☀️</span>
            <span class="icon moon">🌙</span>
          </span>
        </label>
      </div>
    </div>
  </div>

  <div class="forget-container">
    <h1>Reset Password</h1>

    <form onsubmit="return submitForgetForm()">
      <label for="email" class="form-label">Enter your email</label>
      <input type="email" id="email" placeholder="Email address" />

      <button type="submit">Send Reset Link</button>
    </form>

    <p class="login-link">
    <a href="login.html">go back to login page</a>
    </p>
  </div>

  <div class="popup" id="popup">
    <div class="popup-content">
      <h3>Reset Link Sent</h3>
      <p>If this email exists in our system, you will receive a reset link shortly.</p>
      <br>
      <button onclick="closePopup()">Close</button>
    </div>
  </div>

<script>
  function openPopup() {
    document.getElementById('popup').style.display = 'flex';
  }

  function closePopup() {
    document.getElementById('popup').style.display = 'none';
  }

  function submitForgetForm() {
    const email = document.getElementById("email").value.trim();

    if (email) {
      openPopup();
      return false;
    }

    return false;
  }
</script>

</body>
</html>
